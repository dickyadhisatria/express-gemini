<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="chat-container">

        <header class="app-header">
            <div class="logo-orbit" aria-hidden="true">
                <svg viewBox="0 0 40 40" width="36" height="36">
                    <g class="orbit-group">
                        <circle class="orbit-dot dot-a" cx="20" cy="7" r="4"></circle>
                        <circle class="orbit-dot dot-b" cx="20" cy="33" r="4"></circle>
                    </g>
                </svg>
            </div>
            <div class="header-text">
                <h1>Gemini Chat</h1>
                <p class="header-sub">Pilih model &amp; mulai obrolan</p>
            </div>
            <div class="model-select-wrap">
                <select id="model-select" aria-label="Pilih model AI">
                    <option value="gemma-4-31b-it">Gemma 4 31B</option>
                    <option value="gemma-4-26b-a4b-it">Gemma 4 26B</option>
                    <option value="gemini-flash-lite-latest">Gemini Flash Lite Latest</option>
                    <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
                    <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
                </select>
                <svg class="select-chevron" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                    <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
        </header>

        <!-- Area untuk menampilkan pesan -->
        <div id="chat-box" class="chat-box"></div>

        <!-- Form untuk input pengguna -->
        <form id="chat-form" class="chat-form">
            <input type="text" id="user-input" placeholder="Ketik pesan Anda..." autocomplete="off" />
            <button type="submit" class="send-btn" aria-label="Kirim pesan">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path d="M3 11.5L20.5 3 13 20.5l-2.5-7L3 11.5z" fill="currentColor" />
                </svg>
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
